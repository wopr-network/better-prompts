name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  library:
    name: library (test + typecheck)
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

  ui:
    name: ui (typecheck)
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: "install (root, for file: link)"
        run: pnpm install --frozen-lockfile

      - name: "build library (UI consumes ./dist via file: link)"
        run: pnpm build

      - name: install (ui)
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: typecheck (ui)
        working-directory: ui
        run: pnpm typecheck
